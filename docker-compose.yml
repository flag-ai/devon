services:
  devon:
    build: .
    ports:
      - "${DEVON_PORT:-8000}:8000"
    volumes:
      - "${DEVON_DATA_PATH:-devon-data}:/data"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
